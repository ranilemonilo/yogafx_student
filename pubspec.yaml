name: yogafx_student
description: YogaFX Student Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Secure storage (simpan token)
  flutter_secure_storage: ^9.0.0

  # Model generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Video player (BunnyStream HLS)
  video_player: ^2.8.3
  chewie: ^1.7.4

  # Audio player
  just_audio: ^0.9.36

  # PDF viewer
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.4

  # File picker (assignment upload)
  file_picker: ^8.0.3

  # Image
  cached_network_image: ^3.3.1

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  url_launcher: ^6.3.0
  flutter_html: ^3.0.0-beta.2
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/yogafx_logo.png
    - assets/fonts/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
